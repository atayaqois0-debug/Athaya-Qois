name: GitHub Profile Summary Cards

on:
  schedule:
    # Running otomatis setiap tengah malam (00:00 UTC)
    - cron: "0 0 * * *"
  workflow_dispatch:
  # Opsi tambahan: update otomatis setiap kali ada push ke main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-cards
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate Profile Summary Cards
        uses: vn7n24fzkq/github-profile-summary-cards@main
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}

      - name: Commit & Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add profile-summary-card-output/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update profile summary cards [skip ci]" && git push)
